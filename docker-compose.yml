services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kaoruko-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - kaoruko-network

  mongo:
    image: mongo:7
    container_name: kaoruko-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: kaoruko
      MONGO_INITDB_ROOT_PASSWORD: kaoruko_secret_password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - kaoruko-network

networks:
  kaoruko-network:
    driver: bridge

volumes:
  mongo_data:
